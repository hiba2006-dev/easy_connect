<!DOCTYPE html>
<html>
<head>
<title>Inscription - EasyConnect</title>
<link rel="stylesheet" href="/static/style.css?v=20260222-auth">
</head>
<body class="auth-page">

<div class="form-container">
<p class="auth-badge">EasyConnect</p>
<h2>Inscription</h2>
<p class="auth-subtitle">Creez votre compte pour commencer.</p>

<form method="post" action="/auth/register">
    <input type="text" name="username" placeholder="Nom d'utilisateur" required>
    <input type="text" name="full_name" placeholder="Nom complet (optionnel)">
    <input type="email" name="email" placeholder="Email" required>
    <input type="password" name="password" placeholder="Mot de passe" required>
    <button type="submit">Creer un compte</button>
</form>

{% if error %}
<p class="form-error">{{ error }}</p>
{% endif %}
<p>Vous avez deja un compte ? <a href="/auth/login">Se connecter</a></p>

</div>

</body>
</html>
