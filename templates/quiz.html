<!DOCTYPE html>
<html>
<head>
<title>Quiz - EasyConnect</title>
<link rel="stylesheet" href="/static/style.css?v=20260309-no-logo">
</head>
<body class="quiz-page">
<div class="page-shell quiz-shell">
    <header>
        <h1>Quick Quiz</h1>
        <div class="top-links">
            <a href="/dashboard">Dashboard</a>
            <a href="/learning">Learning</a>
            <a href="/account">My account</a>
            <a href="/auth/logout">Logout</a>
        </div>
    </header>

    <section class="quiz-hero">
        <div>
            <p class="quiz-kicker">Quiz</p>
            <h2>Test your knowledge</h2>
            <p class="muted">Answer the questions and track your score live.</p>
        </div>
    </section>

    <div class="panel quiz-panel">
        <p id="quiz-progress" class="muted"></p>
        <h3 id="quiz-question"></h3>
        <div id="quiz-options" class="quiz-options"></div>
        <p id="quiz-feedback" class="quiz-feedback"></p>
        <button id="quiz-next" type="button" class="btn-soft" style="display:none;">Next question</button>
        <button id="quiz-restart" type="button" style="display:none;">Restart</button>
    </div>
    <div id="quiz-congrats" class="quiz-congrats" hidden>
        <span class="quiz-cake">🎂</span>
        <div>
            <p class="quiz-congrats-title">You did it!</p>
            <p class="muted">A fun, cute cake pops up once you finish the whole quiz. Celebrate your new milestone!</p>
        </div>
    </div>
</div>

<script>
const assetVersion = Date.now();

function withAssetVersion(url) {
    if (!url) return url;
    return `${url}${url.includes("?") ? "&" : "?"}v=${assetVersion}`;
}

function isVideoMedia(url) {
    if (!url) return false;
    const clean = url.split("?")[0].toLowerCase();
    return clean.endsWith(".mp4") || clean.endsWith(".webm") || clean.endsWith(".ogg");
}

function toMp4Candidate(url) {
    if (!url) return url;
    const clean = url.split("?")[0];
    if (clean.toLowerCase().endsWith(".mp4")) return withAssetVersion(clean);
    return withAssetVersion(clean.replace(/\.(gif|png|jpe?g|webp)$/i, ".mp4"));
}

function mediaMarkup(url, alt, cssClass) {
    if (!url) {
        return `<span class="${cssClass}">${alt}</span>`;
    }
    const src = withAssetVersion(url);
    if (isVideoMedia(url)) {
        return `<video src="${src}" class="${cssClass}" autoplay loop muted playsinline preload="metadata" aria-label="${alt}"></video>`;
    }
    const fallbackMp4 = toMp4Candidate(url);
    return `<img src="${src}" alt="${alt}" class="${cssClass}" onerror="this.onerror=null; const v=document.createElement('video'); v.className='${cssClass}'; v.src='${fallbackMp4}'; v.autoplay=true; v.loop=true; v.muted=true; v.playsInline=true; this.replaceWith(v);">`;
}

function shuffle(arr) {
    const copy = [...arr];
    for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
}

const progressEl = document.getElementById("quiz-progress");
const questionEl = document.getElementById("quiz-question");
const optionsEl = document.getElementById("quiz-options");
const feedbackEl = document.getElementById("quiz-feedback");
const nextBtn = document.getElementById("quiz-next");
const restartBtn = document.getElementById("quiz-restart");
const congratsEl = document.getElementById("quiz-congrats");

if (congratsEl) {
    congratsEl.hidden = true;
}

let finalAnswerReady = false;

let quizData = [];
let currentIndex = 0;
let score = 0;
let locked = false;

function renderQuestion() {
    if (!quizData.length) {
        questionEl.textContent = "No questions available right now.";
        optionsEl.innerHTML = "";
        return;
    }
    finalAnswerReady = false;
    if (congratsEl) {
        congratsEl.hidden = true;
    }

    const item = quizData[currentIndex];
    locked = false;
    feedbackEl.textContent = "";
    nextBtn.style.display = "none";
    restartBtn.style.display = "none";
    progressEl.textContent = `Question ${currentIndex + 1} / ${quizData.length}`;
    questionEl.textContent = item.prompt;
    optionsEl.innerHTML = "";

    if (item.prompt_type === "gif_to_label") {
        if (item.prompt_media) {
            const visual = document.createElement("div");
            visual.className = "quiz-prompt-gif";
            visual.innerHTML = mediaMarkup(item.prompt_media, "ASL gif", "quiz-prompt-gif-img");
            optionsEl.appendChild(visual);
        }

        item.options.forEach((opt, index) => {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "quiz-option-btn quiz-option-text";
            btn.textContent = opt.label;
            btn.addEventListener("click", () => checkAnswer(index, btn));
            optionsEl.appendChild(btn);
        });
    } else {
        item.options.forEach((opt, index) => {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "quiz-option-btn";
            btn.innerHTML = mediaMarkup(opt.gif, opt.label, "quiz-option-gif");
            btn.addEventListener("click", () => checkAnswer(index, btn));
            optionsEl.appendChild(btn);
        });
    }
}

function checkAnswer(selectedIndex, selectedButton) {
    if (locked || !quizData.length) return;
    locked = true;
    const item = quizData[currentIndex];
    const buttons = optionsEl.querySelectorAll("button");

    buttons.forEach((btn, idx) => {
        if (idx === item.answer_index) btn.classList.add("correct");
    });

    if (selectedIndex === item.answer_index) {
        score += 1;
        feedbackEl.textContent = "Correct answer.";
        feedbackEl.className = "quiz-feedback success";
    } else {
        selectedButton.classList.add("wrong");
        feedbackEl.textContent = "Wrong answer.";
        feedbackEl.className = "quiz-feedback error";
    }

    const isLast = currentIndex === quizData.length - 1;
    nextBtn.textContent = isLast ? "Finish" : "Next question";
    if (nextBtn) {
        nextBtn.style.display = "inline-block";
    }
    finalAnswerReady = isLast;
}

function showResult() {
    progressEl.textContent = "Quiz completed";
    const pct = Math.round((score / quizData.length) * 100);
    questionEl.textContent = `Your score: ${score}/${quizData.length} (${pct}%)`;
    optionsEl.innerHTML = "";
    feedbackEl.textContent = "";
    nextBtn.style.display = "none";
    restartBtn.style.display = "inline-block";
    if (congratsEl) {
        congratsEl.hidden = false;
    }
    notifyQuizCompletion(score, quizData.length, pct);
}


async function notifyQuizCompletion(scoreValue, totalValue, percentValue) {
    if (!totalValue) return;
    try {
        await fetch("/api/quiz/complete", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                score: scoreValue,
                total: totalValue,
                percent: percentValue,
            }),
        });
    } catch (err) {
        // No action needed; activity logging is best-effort.
    }
}

nextBtn.addEventListener("click", () => {
    if (finalAnswerReady) {
        showResult();
        return;
    }
    if (currentIndex < quizData.length - 1) {
        currentIndex += 1;
        renderQuestion();
    }
});

restartBtn.addEventListener("click", () => {
    currentIndex = 0;
    score = 0;
    quizData = shuffle(quizData);
    if (congratsEl) {
        congratsEl.hidden = true;
    }
    renderQuestion();
});

function loadQuizData() {
    fetch("/api/quiz/questions")
        .then((res) => res.json())
        .then((data) => {
            const raw = Array.isArray(data.questions) ? data.questions : [];
            const maxDesired = 20;
            if (!raw.length) {
                quizData = [];
                questionEl.textContent = "No questions available right now.";
                if (congratsEl) congratsEl.hidden = true;
                return;
            }
            const targetCount = Math.min(maxDesired, raw.length);
            const prepared = shuffle(raw).slice(0, targetCount);
            quizData = prepared;
            if (!quizData.length) {
                questionEl.textContent = "No questions available right now.";
                if (congratsEl) congratsEl.hidden = true;
                return;
            }
            currentIndex = 0;
            score = 0;
            locked = false;
            finalAnswerReady = false;
            feedbackEl.textContent = "";
            if (nextBtn) nextBtn.style.display = "none";
            if (restartBtn) restartBtn.style.display = "none";
            if (congratsEl) congratsEl.hidden = true;
            renderQuestion();
        })
        .catch(() => {
            questionEl.textContent = "Unable to load questions.";
            if (congratsEl) congratsEl.hidden = true;
        });
}

loadQuizData();
</script>
</body>
</html>
