<!DOCTYPE html>
<html>
<head>
<title>Learning - EasyConnect</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body class="learning-page">

<div class="page-shell learning-shell">

<header>
<h1>Learning</h1>

<div class="top-links">
<a href="/dashboard">Dashboard</a>
<a href="/community">Community</a>
<a href="/auth/logout">Logout</a>
</div>
</header>


<h2 class="section-title">Available Courses</h2>

<div class="cards-grid learning-courses">

{% for course in courses %}

<div class="card learning-card">

<h3>{{ course.title }}</h3>

<p class="muted">
{{ course.description }}
</p>

{% if progress.get(course.id) %}
<p>Progress: {{ progress[course.id].progress }}%</p>
{% else %}
<p>Progress: 0%</p>
{% endif %}

<form method="post" action="/learning/course/{{ course.id }}/start">
<button type="submit">Start Course</button>
</form>

</div>

{% endfor %}

</div>

</div>

</body>
</html>
