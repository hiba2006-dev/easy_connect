<!DOCTYPE html>
<html>
<head>
<title>Login - EasyConnect</title>
<link rel="stylesheet" href="/static/style.css?v=20260309-no-logo">
</head>
<body class="auth-page">

<div class="form-container">
<p class="auth-badge">EasyConnect</p>
<h2>Login</h2>
<p class="auth-subtitle">Sign in to access your dashboard.</p>

<form method="post" action="/auth/login">
    <input type="text" name="username" placeholder="Username or email" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Sign in</button>
</form>

{% if error %}
<p class="form-error">{{ error }}</p>
{% endif %}
<p>Don't have an account yet? <a href="/auth/register">Create one</a></p>

</div>

</body>
</html>
